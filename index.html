<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>STAGE.LAB — Acting Rehearsal Tool</title>
<meta name="description" content="STAGE.LAB is a professional rehearsal tool for actors. Master subtext, vocal delivery, and performance technique with scene-by-scene coaching cards.">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
  --black:    #0A0A0A;
  --deep:     #111111;
  --surface:  #1A1A1A;
  --raised:   #222222;
  --border:   #2E2E2E;
  --border-hi:#444444;
  --muted:    #666666;
  --subtle:   #999999;
  --text:     #E8E8E2;
  --white:    #F5F5F0;
  --gold:     #C9A84C;
  --gold-dim: #7A6228;
  --red:      #B84040;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

html,body{
  height:100%;
  background:var(--black);
  color:var(--text);
  font-family:'Inter',sans-serif;
  overflow:hidden;
}

body{
  display:flex;
  flex-direction:column;
  height:100dvh;
}

/* ─── STAGE HEADER ─── */
.stage-header{
  flex-shrink:0;
  background:var(--deep);
  border-bottom:1px solid var(--border);
  padding:14px 16px 0;
  display:flex;
  flex-direction:column;
  min-height:200px;
  max-height:38vh;
  position:relative;
  overflow:hidden;
}

/* scanline texture */
.stage-header::before{
  content:'';
  position:absolute;
  inset:0;
  background:repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(255,255,255,0.015) 2px,
    rgba(255,255,255,0.015) 4px
  );
  pointer-events:none;
  z-index:0;
}

.header-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:relative;
  z-index:1;
  flex-shrink:0;
}

.brand{
  display:flex;
  align-items:center;
  gap:8px;
  font-family:'DM Mono',monospace;
  font-size:11px;
  font-weight:500;
  letter-spacing:2.5px;
  text-transform:uppercase;
  color:var(--gold);
}

.brand-dot{
  width:6px;height:6px;
  background:var(--gold);
  border-radius:50%;
  animation:pulse 2.4s ease-in-out infinite;
}

@keyframes pulse{
  0%,100%{opacity:1;transform:scale(1)}
  50%{opacity:0.4;transform:scale(0.7)}
}

.counter-badge{
  font-family:'DM Mono',monospace;
  font-size:11px;
  color:var(--muted);
  letter-spacing:1px;
  background:var(--surface);
  border:1px solid var(--border);
  padding:4px 10px;
  border-radius:20px;
}

.script-stage{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:16px 4px 12px;
  position:relative;
  z-index:1;
  gap:10px;
}

.quote-marks{
  font-family:'Playfair Display',serif;
  font-size:48px;
  line-height:1;
  color:var(--gold-dim);
  align-self:flex-start;
  margin-left:8px;
  margin-bottom:-16px;
}

.script-line{
  font-family:'Playfair Display',serif;
  font-style:italic;
  font-size:clamp(16px,4.5vw,22px);
  color:var(--white);
  line-height:1.5;
  text-align:center;
  transition:opacity 0.22s ease, transform 0.22s ease;
  padding:0 8px;
}

.script-line.out{
  opacity:0;
  transform:translateY(6px);
}

.technique-label{
  font-family:'DM Mono',monospace;
  font-size:9px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--muted);
  text-align:center;
  flex-shrink:0;
}

/* ─── TAB BAR ─── */
.tab-bar{
  flex-shrink:0;
  display:grid;
  grid-template-columns:1fr 1fr;
  background:var(--deep);
  border-bottom:1px solid var(--border);
}

.tab{
  font-family:'Inter',sans-serif;
  font-size:12px;
  font-weight:600;
  letter-spacing:0.5px;
  color:var(--muted);
  background:transparent;
  border:none;
  padding:13px 8px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  border-bottom:2px solid transparent;
  transition:color 0.15s, border-color 0.15s;
  text-transform:uppercase;
}

.tab.active{
  color:var(--gold);
  border-bottom-color:var(--gold);
}

/* ─── CONTENT SCROLL ─── */
.content-scroll{
  flex:1;
  overflow-y:auto;
  background:var(--black);
  padding:14px 14px 0;
  display:flex;
  flex-direction:column;
  gap:10px;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.content-scroll::-webkit-scrollbar{display:none}

/* Cards */
.card-label{
  font-family:'DM Mono',monospace;
  font-size:9px;
  font-weight:500;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:6px;
  display:flex;
  align-items:center;
  gap:6px;
}

.card-label i{
  color:var(--gold);
  font-size:9px;
}

.info-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  padding:14px;
}

.card-title{
  font-size:11px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:1px;
  color:var(--gold);
  margin-bottom:7px;
}

.card-body{
  font-size:13.5px;
  color:var(--subtle);
  line-height:1.6;
}

/* Reveal card */
.reveal-card{
  background:var(--surface);
  border:1px dashed var(--gold-dim);
  border-radius:10px;
  padding:14px;
  cursor:pointer;
  position:relative;
  min-height:80px;
  transition:border-color 0.15s, background 0.15s;
  user-select:none;
}

.reveal-card:active{background:var(--raised)}

.reveal-card.locked .card-title,
.reveal-card.locked .card-body{
  filter:blur(5px);
  opacity:0.12;
  pointer-events:none;
}

.reveal-pill{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  pointer-events:none;
}

.reveal-pill span{
  background:var(--gold);
  color:var(--black);
  font-family:'Inter',sans-serif;
  font-size:10px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:1.5px;
  padding:6px 14px;
  border-radius:20px;
}

/* Modifier card */
.mod-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-left:3px solid var(--gold);
  border-radius:10px;
  padding:14px;
  margin-bottom:14px;
}

.mod-body{
  font-size:13.5px;
  color:var(--text);
  font-weight:500;
  line-height:1.6;
}

/* ─── BOTTOM BAR ─── */
.bottom-bar{
  flex-shrink:0;
  background:var(--deep);
  border-top:1px solid var(--border);
  padding:10px 14px 14px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.btn-row{
  display:grid;
  grid-template-columns:1.4fr 1fr;
  gap:8px;
}

.btn{
  font-family:'Inter',sans-serif;
  font-size:12px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.8px;
  border:none;
  border-radius:10px;
  padding:13px 10px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:7px;
  transition:opacity 0.12s, transform 0.1s;
}

.btn:active{opacity:0.75;transform:scale(0.97)}

.btn-gold{background:var(--gold);color:var(--black)}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--border-hi)}
.btn-ghost{background:var(--surface);color:var(--subtle);font-size:11px;padding:10px}

/* ─── DRAWER ─── */
.overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.7);
  z-index:100;
  opacity:0;pointer-events:none;
  transition:opacity 0.28s ease;
  backdrop-filter:blur(3px);
}
.overlay.open{opacity:1;pointer-events:all}

.drawer{
  position:fixed;
  bottom:0;left:0;width:100%;height:80%;
  background:var(--deep);
  border-top:1px solid var(--border-hi);
  border-radius:18px 18px 0 0;
  transform:translateY(100%);
  transition:transform 0.3s cubic-bezier(0.22,0.78,0.44,0.98);
  z-index:101;
  display:flex;
  flex-direction:column;
  padding:16px 16px 24px;
}
.drawer.open{transform:translateY(0)}

.drawer-pill{
  width:36px;height:4px;
  background:var(--border-hi);
  border-radius:99px;
  margin:0 auto 16px;
}

.drawer-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:14px;
}

.drawer-heading{
  font-size:13px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:1.5px;
  color:var(--gold);
  display:flex;
  align-items:center;
  gap:8px;
}

.close-x{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:50%;
  width:32px;height:32px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  color:var(--subtle);
  font-size:14px;
  transition:color 0.15s;
}
.close-x:active{color:var(--text)}

.journal-input{
  width:100%;
  height:88px;
  background:var(--surface);
  border:1px solid var(--border-hi);
  border-radius:9px;
  color:var(--text);
  font-family:'Inter',sans-serif;
  font-size:14px;
  line-height:1.5;
  padding:12px;
  resize:none;
  outline:none;
  margin-bottom:10px;
  transition:border-color 0.15s;
}
.journal-input::placeholder{color:var(--muted)}
.journal-input:focus{border-color:var(--gold)}

.log-section-label{
  font-family:'DM Mono',monospace;
  font-size:9px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--muted);
  margin:10px 0 8px;
}

.notes-scroll{
  flex:1;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:8px;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.notes-scroll::-webkit-scrollbar{display:none}

.note-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-left:2px solid var(--gold);
  border-radius:8px;
  padding:10px 12px;
}

.note-tag{
  font-family:'DM Mono',monospace;
  font-size:9px;
  letter-spacing:1.5px;
  text-transform:uppercase;
  color:var(--gold-dim);
  margin-bottom:4px;
}

.note-text{
  font-size:13px;
  color:var(--subtle);
  line-height:1.5;
}

.empty-log{
  text-align:center;
  color:var(--muted);
  font-size:13px;
  line-height:1.6;
  margin-top:28px;
}

/* ─── TOAST ─── */
.toast{
  position:fixed;
  bottom:100px;
  left:50%;
  transform:translateX(-50%) translateY(20px);
  background:var(--gold);
  color:var(--black);
  font-size:11px;
  font-weight:700;
  letter-spacing:1px;
  text-transform:uppercase;
  padding:8px 18px;
  border-radius:20px;
  opacity:0;
  transition:opacity 0.2s, transform 0.2s;
  pointer-events:none;
  white-space:nowrap;
  z-index:200;
}
.toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

/* ─── PROGRESS BAR ─── */
.progress-bar{
  height:2px;
  background:var(--border);
  position:relative;
  overflow:hidden;
  flex-shrink:0;
}
.progress-fill{
  height:100%;
  background:var(--gold);
  transition:width 0.3s ease;
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="stage-header">
  <div class="header-top">
    <div class="brand">
      <div class="brand-dot"></div>
      STAGE.LAB
    </div>
    <div class="counter-badge" id="counterBadge">01 / 20</div>
  </div>
  <div class="script-stage">
    <div class="quote-marks">"</div>
    <p class="script-line" id="scriptLine">Loading scene...</p>
  </div>
  <div class="technique-label" id="techniqueLabel">—</div>
</header>

<!-- PROGRESS -->
<div class="progress-bar">
  <div class="progress-fill" id="progressFill" style="width:5%"></div>
</div>

<!-- TABS -->
<div class="tab-bar">
  <button class="tab active" id="tab-emotion" onclick="switchTab('emotion')">
    <i class="fa-solid fa-masks-theater"></i> Subtext Engine
  </button>
  <button class="tab" id="tab-voice" onclick="switchTab('voice')">
    <i class="fa-solid fa-waveform-lines"></i> Vocal Delivery
  </button>
</div>

<!-- SCROLL CONTENT -->
<div class="content-scroll" id="contentScroll">

  <div>
    <div class="card-label"><i class="fa-solid fa-compass"></i> Core Analysis</div>
    <div class="info-card">
      <div class="card-title" id="modeTitle">—</div>
      <div class="card-body" id="modeDesc">—</div>
    </div>
  </div>

  <div>
    <div class="card-label"><i class="fa-solid fa-eye-slash"></i> Hidden Layer — Subtextual Intent</div>
    <div class="reveal-card locked" id="revealCard" onclick="toggleReveal()">
      <div class="reveal-pill" id="revealPill"><span>Tap to Unlock</span></div>
      <div class="card-title" id="secretTitle">—</div>
      <div class="card-body" id="secretDesc">—</div>
    </div>
  </div>

  <div>
    <div class="card-label"><i class="fa-solid fa-wand-magic-sparkles"></i> Director's Note</div>
    <div class="mod-card">
      <div class="mod-body" id="modNote">—</div>
    </div>
  </div>

</div>

<!-- BOTTOM BAR -->
<div class="bottom-bar">
  <button class="btn btn-ghost" style="width:100%" onclick="openDrawer()">
    <i class="fa-regular fa-pen-to-square"></i> Performance Journal
  </button>
  <div class="btn-row">
    <button class="btn btn-gold" onclick="nextCard()">
      <i class="fa-solid fa-arrow-right"></i> Next Scene
    </button>
    <button class="btn btn-outline" onclick="mixTake()">
      <i class="fa-solid fa-shuffle"></i> Mix Take
    </button>
  </div>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeDrawer()"></div>

<!-- DRAWER -->
<div class="drawer" id="drawer">
  <div class="drawer-pill"></div>
  <div class="drawer-top">
    <div class="drawer-heading"><i class="fa-solid fa-film"></i> Performance Journal</div>
    <div class="close-x" onclick="closeDrawer()"><i class="fa-solid fa-xmark"></i></div>
  </div>
  <textarea class="journal-input" id="journalInput" placeholder="Log a take — tone choices, timing notes, what broke, what landed..."></textarea>
  <button class="btn btn-gold" style="width:100%;padding:12px" onclick="saveNote()">
    <i class="fa-solid fa-floppy-disk"></i> Save Entry
  </button>
  <div class="log-section-label">Production Log</div>
  <div class="notes-scroll" id="notesList">
    <div class="empty-log" id="emptyLog">No entries yet.<br>Log your first take above.</div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">Entry Saved</div>

<script>
/* ══════════════════════════════════════════
   DATABASE — 20 cards × 2 categories = 40
══════════════════════════════════════════ */
const DB = {

emotion: [
  {
    title:"Uta Hagen — Substitution Method",
    prompt:"If we don't leave this building right now, nothing else matters.",
    desc:"Replace the fictional emergency with a real high-stakes memory. Force the listener into immediate physical action without sounding panicked. The urgency must feel lived-in, not performed.",
    secTitle:"Psychological Anchor",
    secDesc:"Your objective is pure structural defense. If they don't move, everything you've built collapses. This is not a warning — this is a last resort.",
    tip:"Lock your eyes on one point. Deliver the entire line without a single secondary head movement. Let stillness carry the danger."
  },
  {
    title:"Subtextual Contradiction Blueprint",
    prompt:"Yeah. No, absolutely. You made the correct choice.",
    desc:"The words confirm, but every muscle in your body must broadcast the opposite. Study the architecture of a smile that does not reach the eyes.",
    secTitle:"Internal Monologue",
    secDesc:"Their decision just wrecked your operation. You are now running quiet damage control while holding this conversation.",
    tip:"Hold a customer-service smile for the full line. Make your eyes flat and unblinking. The gap between face and eyes is the performance."
  },
  {
    title:"Classic Tragedy — Grief Study",
    prompt:"All my pretty ones? Did you say all? O hell-kite! All?",
    desc:"Macduff's moment of total collapse. Don't reach for anger — play the exact second reality stops making sense. The anger comes later. Right now: disbelief.",
    secTitle:"Substitution: Loss",
    secDesc:"Replace the political murder with the most irreversible loss in your own memory. The word 'all' should land like a door slamming shut forever.",
    tip:"Hold three full seconds of silence before the final 'All?' Your face should fall completely empty. Let the audience sit in the void."
  },
  {
    title:"Interrogation — Intellectual Armor",
    prompt:"You ask me if I'm lying? The question itself is a diversion.",
    desc:"You are the smartest person in the room and you both know it. Use logic as a weapon. Deflect, reframe, and expose the weakness in their line of attack — all without raising your voice.",
    secTitle:"Secret Monologue: Contempt",
    secDesc:"I know exactly where everything is. You will never reach it. I am enjoying watching you fail in real time.",
    tip:"Drop into your lowest comfortable register. Adopt posture of total physical relaxation — as if this interrogation bores you."
  },
  {
    title:"Betrayal — Finality",
    prompt:"I stood by you when everyone else called you a liability.",
    desc:"Two former allies. This is not an explosion — it's a door quietly closing. The most devastating confrontations happen at low volume.",
    secTitle:"Internal Motivation: Closure",
    secDesc:"This is the precise moment the relationship becomes unrecoverable. You are not angry. You are finished. There is a difference.",
    tip:"Drop your chin slightly. Maintain eye contact through the word 'liability' without blinking once. The stillness is the sentence."
  },
  {
    title:"Corporate Deflection",
    prompt:"We're not here to discuss my history. We're here to talk about what you left on that server.",
    desc:"Redirect a hostile line of questioning straight back onto damning evidence you already hold. The professional tone is the threat.",
    secTitle:"Subtextual Goal: Domination",
    secDesc:"Their attempts to dig into your background are failing completely. Let them feel that fact before you even finish the sentence.",
    tip:"Accelerate sharply on the second sentence. Drive them backward into a defensive stance with your tempo alone."
  },
  {
    title:"The Ultimate Sacrifice",
    prompt:"Close the bulkheads behind me. Do it now, before the sequence overrides your controls.",
    desc:"You are trapped on the wrong side of a lockdown — by choice. Frame selflessness as tactical commands. Stay completely calm.",
    secTitle:"Hidden Objective: Release",
    secDesc:"You have accepted what comes next. Every second they waste trying to rescue you is a second of grief you're trying to spare them.",
    tip:"Lift and open your chest. Let your breathing slow visibly. The calmer you are, the more the sacrifice lands."
  },
  {
    title:"Conspiracy Realization",
    prompt:"They didn't lose the code. They released the backdoor on purpose.",
    desc:"The shift from incompetence to malice — and the scale of the malice is enormous. This is not anger. This is a new kind of fear.",
    secTitle:"Psychological Shift: Dread",
    secDesc:"You are no longer frustrated at a mistake. You are now terrified by how far this actually goes — and who is behind it.",
    tip:"Let your body slowly drift backward as you speak. Something massive just came into focus and you are instinctively retreating from it."
  },
  {
    title:"The False Comfort Trap",
    prompt:"Take a breath. Nobody is tracking your location anymore. You're completely safe here with us.",
    desc:"Warm words, cold objective. You need them to stay put, calm down, and trust you. The tenderness is the mechanism.",
    secTitle:"The Double-Cross",
    secDesc:"You are the one who gave away their coordinates. Extraction is already on route. Every word of comfort is containment protocol.",
    tip:"Soften your face completely. Release every micro-tension point around your mouth and eyes. Become genuinely warm — that is what makes it dangerous."
  },
  {
    title:"The Retribution Monologue",
    prompt:"You thought I'd forget what you did to my team? I've been tracing this loop for three years.",
    desc:"Cold vengeance, not hot anger. The hunt is over. You have found your target. There is no need to raise your voice — you've already won.",
    secTitle:"Emotional Core: Satisfaction",
    secDesc:"This is the controlled, quiet celebration of patience defeating chaos. You planned this for years. Every move was exact. Savor it.",
    tip:"Allow one brief, genuine micro-smile between the two sentences. Let it settle before you continue. That pause is everything."
  },
  {
    title:"The Apology That Isn't",
    prompt:"I'm sorry you feel that way. I truly am.",
    desc:"A masterclass in weaponized empathy. The words perform contrition. The structure erases accountability entirely. Find the precision in the syntax.",
    secTitle:"Underlying Strategy",
    secDesc:"You are apologizing for their emotional response, not for anything you did. This is a power move disguised as vulnerability.",
    tip:"Deliver with your head slightly tilted — the posture of genuine concern. Let the grammatical trap land softly."
  },
  {
    title:"The Mentor's Final Lesson",
    prompt:"Everything I taught you, everything — and this is the choice you make.",
    desc:"Profound disappointment without cruelty. You're not trying to wound them — you genuinely cannot understand how it came to this.",
    secTitle:"Internal Reality",
    secDesc:"This failure reflects on you too. You trained them. Part of this question is directed inward.",
    tip:"Let a real pause sit in the space after 'everything — '. The repetition is a wound. Don't rush past it."
  },
  {
    title:"The Reluctant Confession",
    prompt:"I knew about it. I've known since the beginning. I just couldn't tell you.",
    desc:"Confession under pressure — but the guilt is layered. You had reasons. Complicated, defensible reasons. Find those reasons before you speak.",
    secTitle:"Emotional Complexity",
    secDesc:"You protected them by staying silent. Or so you told yourself. The question you can't answer: were you protecting them, or yourself?",
    tip:"Don't rush to fill the silence after the second sentence. Let it breathe. Guilt breathes slowly."
  },
  {
    title:"Power Through Stillness",
    prompt:"I won't ask you again.",
    desc:"Five words. Everything is in what you do not say. Practice this line until every redundant gesture, expression, and breath is stripped out.",
    secTitle:"The Architecture of Threat",
    secDesc:"The people who are actually dangerous do not perform danger. They simply state fact. That distinction is the entire scene.",
    tip:"Deliver it once, completely flat, and do not move a single muscle afterward. Let the stillness be the period."
  },
  {
    title:"The Character Witness",
    prompt:"I've known him for twenty years. That man in there — that is not who I raised.",

const MIXES = [
  "Stretch every internal pause to a full three seconds. Let the silence accumulate between thoughts.",
  "Deliver the entire line while suppressing a quiet, controlled laugh underneath every word.",
  "Drop to near-inaudibility. Force the mic to chase your most unguarded tone.",
  "Speak as if this is the final effort your body has available. Every word costs something.",
  "Run the tempo at double speed — as if the door is physically closing behind you right now.",
  "Fix a completely artificial smile on your face and hold it through every single word.",
  "Deliver the line as if you are reading it from a document you didn't write and don't believe.",
  "Find and hold the emotional register of the line — then deliver it in the opposite vocal tone."
];

/* ── STATE ── */
let cat = 'emotion';
let idx = 0;
let revealed = false;
const notes = [];

/* ── RENDER ── */
function render(animate) {
  const deck = DB[cat];
  const card = deck[idx];
  if (!card) return;

  const lineEl = document.getElementById('scriptLine');

  if (animate) {
    lineEl.classList.add('out');
    setTimeout(() => {
      lineEl.textContent = card.prompt;
      lineEl.classList.remove('out');
    }, 200);
  } else {
    lineEl.textContent = card.prompt;
  }

  document.getElementById('techniqueLabel').textContent = card.title;
  document.getElementById('counterBadge').textContent =
    String(idx + 1).padStart(2,'0') + ' / ' + String(deck.length).padStart(2,'0');
  document.getElementById('progressFill').style.width =
    ((idx + 1) / deck.length * 100) + '%';

  document.getElementById('modeTitle').textContent = card.title;
  document.getElementById('modeDesc').textContent = card.desc;
  document.getElementById('secretTitle').textContent = card.secTitle;
  document.getElementById('secretDesc').textContent = card.secDesc;
  document.getElementById('modNote').textContent = card.tip;

  const rc = document.getElementById('revealCard');
  const rp = document.getElementById('revealPill');
  rc.classList.toggle('locked', !revealed);
  rp.style.display = revealed ? 'none' : 'flex';

  document.getElementById('contentScroll').scrollTop = 0;
}

/* ── CONTROLS ── */
function switchTab(key) {
  if (cat === key) return;
  cat = key;
  idx = 0;
  revealed = false;
  document.getElementById('tab-emotion').classList.toggle('active', key === 'emotion');
  document.getElementById('tab-voice').classList.toggle('active', key === 'voice');
  render(true);
}

function nextCard() {
  idx = (idx + 1) % DB[cat].length;
  revealed = false;
  render(true);
}

function toggleReveal() {
  revealed = !revealed;
  render(false);
}

function mixTake() {
  const mix = MIXES[Math.floor(Math.random() * MIXES.length)];
  document.getElementById('modNote').textContent = '⚡ ' + mix;
}

/* ── DRAWER ── */
function openDrawer() {
  document.getElementById('drawer').classList.add('open');
  document.getElementById('overlay').classList.add('open');
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

/* ── NOTES ── */
function saveNote() {
  const input = document.getElementById('journalInput');
  const text = input.value.trim();
  if (!text) return;
  const card = DB[cat][idx];
  notes.unshift({ tag: card.title, text });
  input.value = '';
  renderNotes();
  showToast('Entry Saved');
}

function renderNotes() {
  const list = document.getElementById('notesList');
  if (!notes.length) {
    list.innerHTML = '<div class="empty-log" id="emptyLog">No entries yet.<br>Log your first take above.</div>';
    return;
  }
  list.innerHTML = notes.map(n => `
    <div class="note-card">
      <div class="note-tag">${n.tag}</div>
      <div class="note-text">${n.text}</div>
    </div>
  `).join('');
}

/* ── TOAST ── */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

window.addEventListener('load', () => render(false));
</script>
