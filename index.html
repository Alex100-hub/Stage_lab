<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STAGE.LAB // Production Master</title>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght=700&family=Space+Grotesk:wght=500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-main: #FFFFFF;
            --bg-accent: #F4F4F5;
            --text-dark: #000000;
            --text-muted: #525252;
            --border-line: #E4E4E7;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Space Grotesk', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-dark);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* --- SCRIPT VIEWPORT (SHRUNK TO 22% HEIGHT) --- */
        .script-viewport {
            height: 22%;
            background: var(--bg-main);
            border-bottom: 1px solid var(--text-dark);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 6px;
            text-align: center;
            position: relative;
        }

        .brand-header {
            position: absolute;
            top: 4px;
            left: 10px;
            font-size: 8px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dark);
        }

        .script-text {
            font-family: 'Courier Prime', monospace;
            font-size: 15px;
            font-weight: 700;
            color: var(--text-dark);
            line-height: 1.2;
            max-width: 95%;
            margin-top: 8px;
        }

        /* --- CONTROL PANEL CONTAINER --- */
        .controls-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 6px 10px;
            background: var(--bg-accent);
            justify-content: space-between;
        }

        .category-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px;
            margin-bottom: 4px;
            background: var(--bg-main);
            padding: 2px;
            border-radius: 6px;
            border: 1px solid var(--border-line);
        }

        .category-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 4px;
            font-size: 11px;
            font-weight: 700;
            border-radius: 4px;
            cursor: pointer;
        }

        .category-btn.active {
            background: var(--text-dark);
            color: var(--bg-main);
        }

        /* --- TIGHTENED CARD CONTAINER --- */
        .info-scroll {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
            overflow: hidden; 
            margin-bottom: 4px;
            justify-content: center;
        }

        .label-text {
            font-size: 8px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dark);
            margin-bottom: 1px;
        }

        .info-box {
            background: var(--bg-main);
            border: 1px solid var(--border-line);
            padding: 5px 8px;
            border-radius: 6px;
        }

        .info-title {
            font-size: 9px;
            font-weight: 700;
            margin-bottom: 1px;
            text-transform: uppercase;
        }

        .info-desc {
            font-size: 10px;
            color: var(--text-muted);
            line-height: 1.2;
        }

        .reveal-box {
            background: var(--bg-main);
            border: 1px dashed var(--text-dark);
            padding: 5px 8px;
            border-radius: 6px;
            position: relative;
            cursor: pointer;
        }

        .reveal-box.hidden .info-desc {
            filter: blur(5px);
            opacity: 0.1;
        }

        .reveal-prompt {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--text-dark);
            color: var(--bg-main);
            padding: 2px 6px;
            font-size: 8px;
            font-weight: 700;
            text-transform: uppercase;
            border-radius: 4px;
        }

        /* --- COMPACT ACTION BUTTONS AREA --- */
        .bottom-controls-wrapper {
            margin-top: auto;
            padding-top: 2px;
        }

        .feedback-trigger-btn {
            width: 100%;
            background: var(--bg-main);
            border: 1px solid var(--border-line);
            color: var(--text-dark);
            padding: 6px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            cursor: pointer;
            margin-bottom: 4px;
        }

        .footer-tray {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 4px;
        }

        .action-btn {
            background: var(--bg-main);
            color: var(--text-dark);
            border: 1px solid var(--text-dark);
            padding: 8px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .action-btn.black-out {
            background: var(--text-dark);
            color: var(--bg-main);
            border: none;
        }

        .action-btn:active, .feedback-trigger-btn:active {
            opacity: 0.85;
        }

        /* --- SYSTEM JOURNAL DRAWER --- */
        .feedback-drawer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 70%;
            background: var(--bg-main);
            border-top: 2px solid var(--text-dark);
            border-radius: 16px 16px 0 0;
            box-shadow: 0 -6px 20px rgba(0,0,0,0.1);
            transform: translateY(100%);
            transition: transform 0.25s ease-out;
            z-index: 200;
            display: flex;
            flex-direction: column;
            padding: 14px;
        }

        .feedback-drawer.open {
            transform: translateY(0);
        }

        .drawer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .feedback-input {
            width: 100%;
            height: 60px;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid var(--text-dark);
            font-size: 12px;
            resize: none;
            outline: none;
            margin-bottom: 8px;
        }

        .history-title {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            margin-top: 6px;
            margin-bottom: 4px;
            color: var(--text-muted);
        }

        .notes-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: var(--bg-accent);
            padding: 8px;
            border-radius: 6px;
            border: 1px solid var(--border-line);
        }

        .note-item {
            background: var(--bg-main);
            padding: 8px;
            border-radius: 4px;
            border-left: 3px solid var(--text-dark);
            font-size: 11px;
            line-height: 1.3;
        }

        .note-tag {
            font-size: 9px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 2px;
        }
    </style>
</head>
<body>

    <section class="script-viewport">
        <div class="brand-header">
            <i class="fa-solid fa-clapperboard"></i> STAGE.LAB // Rehearsal Mode
        </div>
        <p class="script-text" id="scriptLineDisplay">"Loading system..."</p>
    </section>

    <section class="controls-panel">
        
        <div class="category-row">
            <button class="category-btn active" id="tab-emotion" onclick="toggleMode('emotion')">🎭 Subtext Engine</button>
            <button class="category-btn" id="tab-voice" onclick="toggleMode('voice')">🗣️ Vocal Delivery</button>
        </div>

        <div class="info-scroll">
            <div>
                <div class="label-text"><i class="fa-solid fa-compass"></i> Core Mechanism:</div>
                <div class="info-box">
                    <div class="info-title" id="modeTitle">---</div>
                    <div class="info-desc" id="modeDesc">---</div>
                </div>
            </div>

            <div>
                <div class="label-text"><i class="fa-solid fa-eye-slash"></i> Hidden Layer:</div>
                <div class="reveal-box hidden" id="secretBox" onclick="clickRevealSecret()">
                    <div class="reveal-prompt" id="secretLabel">Tap to Decipher</div>
                    <div class="info-title" id="secretTitle">---</div>
                    <div class="info-desc" id="secretDesc">---</div>
                </div>
            </div>

            <div>
                <div class="label-text"><i class="fa-solid fa-wand-magic-sparkles"></i> Modifier:</div>
                <div class="info-box" style="border-left: 3px solid var(--text-dark);">
                    <div class="info-desc" id="tipDesc" style="color: var(--text-dark); font-weight: 500;">---</div>
                </div>
            </div>
        </div>

        <div class="bottom-controls-wrapper">
            <button class="feedback-trigger-btn" onclick="openFeedbackDrawer()">
                <i class="fa-regular fa-comment-dots"></i> Log Feedback
            </button>

            <div class="footer-tray">
                <button class="action-btn black-out" onclick="changeCard()">
                    <i class="fa-solid fa-arrow-right"></i> Next Setup
                </button>
                <button class="action-btn" onclick="mixUpDirectorNote()">
                    <i class="fa-solid fa-shuffle"></i> Mix Take
                </button>
            </div>
        </div>
    </section>

    <div class="feedback-drawer" id="feedbackDrawer">
        <div class="drawer-header">
            <h3 class="info-title" style="font-size: 13px; margin: 0;"><i class="fa-solid fa-pen-to-square"></i> Performance Journal</h3>
            <i class="fa-solid fa-xmark" style="font-size: 18px; cursor: pointer;" onclick="closeFeedbackDrawer()"></i>
        </div>

        <textarea class="feedback-input" id="feedbackNoteInput" placeholder="Type notes to remember..."></textarea>
        
        <button class="action-btn black-out" style="width: 100%; padding: 10px; font-size: 11px; margin-bottom: 8px;" onclick="saveFeedbackNote()">
            Save Entry
        </button>

        <div class="history-title">Saved Log:</div>
        <div class="notes-list" id="notesListContainer">
            <div class="info-desc" id="emptyNotesMsg" style="text-align: center; margin-top: 15px;">No logged reviews yet.</div>
        </div>
    </div>

    <script>
        const gameDatabase = {
            emotion: [
                {
                    title: "Uta Hagen Substitution Method",
                    prompt: "If we don't leave this building right now, nothing else matters.",
                    desc: "Swap out the fictional emergency for a real-world high-stakes disaster. Force immediate physical action without sounding panicked.",
                    secTitle: "The Psychological Anchor",
                    secDesc: "Your objective is defense. If they stay here, their layout or projects will completely crash.",
                    tip: "Pin down your eyes. Deliver the line while completely limiting your secondary head gestures."
                },
                {
                    title: "Subtextual Contradiction Blueprint",
                    prompt: "Yeah. No, absolutely. You made the correct choice.",
                    desc: "Words express agreement, but your physical stance must display deep underlying stress.",
                    secTitle: "Internal Monologue Tracker",
                    secDesc: "The choice they made completely ruined your layout, and you are trying to clean up the error parameters.",
                    tip: "Keep a steady smile fixed on your face, but make your eyes cold and unblinking."
                },
                {
                    title: "Classic Tragedy / Grief Study",
                    prompt: "All my pretty ones? Did you say all? O hell-kite! All?",
                    desc: "Don't play the anger yet; play the absolute shock and disbelief of a person whose reality has collapsed.",
                    secTitle: "Substitution: Loss",
                    secDesc: "Substitute this for the sudden, tragic loss of something genuinely precious in your own history registry.",
                    tip: "Take a full three-second silent beat before you speak the final word, 'All?' Let your face fall flat."
                },
                {
                    title: "Interrogation / Stalling Tactic",
                    prompt: "You ask me if I am lying? The question itself is a calculated diversion.",
                    desc: "You are hiding critical data coordinates. Use intellectual arrogance and calculated logic as your shield.",
                    secTitle: "Secret Monologue: Contempt",
                    secDesc: "I am smarter than you, I know where the files are. I am enjoying watching you fail.",
                    tip: "Adopt a posture of complete relaxation. Lower your voice pitch to its minimum structural register."
                }
            ],
            voice: [
                {
                    title: "Residual Breath Compression",
                    prompt: "There is someone else inside this room. Keep quiet.",
                    desc: "Exhale 85% of your available lung capacity completely before speaking. Use only residual air.",
                    secTitle: "Acoustic Target Parameter",
                    secDesc: "Forces your delivery to sound naturally desperate and raspy without artificially stressing your throat.",
                    tip: "Execute a full 2-second micro-pause right before delivering the structural word 'Quiet'."
                },
                {
                    title: "Operative Stress Shift Matrix",
                    prompt: "I never said you were the one who lost the folder files.",
                    desc: "Test this line by shifting emphasis across specific terms to completely transform the accusation.",
                    secTitle: "Vocal Target Breakdown",
                    secDesc: "Punching 'NEVER' acts defensively. Punching 'YOU' turns the line into an attack.",
                    tip: "Physically lean your body framework forward into the lens coordinates right as you hit the stressed word."
                }
            ]
        };

        const advancedModifiers = [
            "MIX TAKE: Stretch the internal pauses between thought layers to 3 full seconds.",
            "MIX TAKE: Deliver the full script while holding an intense, quiet laugh.",
            "MIX TAKE: Drop the volume to a near whisper, forcing the mic to track your raw tone.",
            "MIX TAKE: Speak with extreme exhaustion, treating each word as your final energy resource."
        ];

        let currentCategory = 'emotion';
        let cardIndex = 0;
        let isRevealed = false;

        function toggleMode(modeKey) {
            if (currentCategory === modeKey) return;
            currentCategory = modeKey;
            cardIndex = 0;
            isRevealed = false;

            document.getElementById('tab-emotion').classList.toggle('active', modeKey === 'emotion');
            document.getElementById('tab-voice').classList.toggle('active', modeKey === 'voice');

            updateAppUi();
        }

        function updateAppUi() {
            const currentDeck = gameDatabase[currentCategory];
            const activeNode = currentDeck[cardIndex];

            if (!activeNode) return;

            document.getElementById('scriptLineDisplay').innerText = `"${activeNode.prompt}"`;
            document.getElementById('modeTitle').innerText = activeNode.title;
            document.getElementById('modeDesc').innerText = activeNode.desc;
            document.getElementById('secretTitle').innerText = activeNode.secTitle;
            document.getElementById('secretDesc').innerText = activeNode.secDesc;
            document.getElementById('tipDesc').innerText = activeNode.tip;

            const secretCardEl = document.getElementById('secretBox');
            const labelEl = document.getElementById('secretLabel');

            if (isRevealed) {
                secretCardEl.classList.remove('hidden');
                labelEl.style.display = 'none';
            } else {
                secretCardEl.classList.add('hidden');
                labelEl.style.display = 'block';
            }
        }

        function changeCard() {
            const currentDeck = gameDatabase[currentCategory];
            cardIndex = (cardIndex + 1) % currentDeck.length;
            isRevealed = false;
            updateAppUi();
        }

        function clickRevealSecret() {
            isRevealed = !isRevealed;
            updateAppUi();
        }

        function mixUpDirectorNote() {
            const randomMix = advancedModifiers[Math.floor(Math.random() * advancedModifiers.length)];
            document.getElementById('tipDesc').innerHTML = `<strong>${randomMix}</strong>`;
        }

        function openFeedbackDrawer() {
            document.getElementById('feedbackDrawer').classList.add('open');
        }

        function closeFeedbackDrawer() {
            document.getElementById('feedbackDrawer').classList.toggle('open', false);
        }

        function saveFeedbackNote() {
            const textarea = document.getElementById('feedbackNoteInput');
            const noteText = textarea.value.trim();
            if (noteText === "") return;

            const currentDeck = gameDatabase[currentCategory];
            const activeNode = currentDeck[cardIndex];

            const emptyMsg = document.getElementById('emptyNotesMsg');
            if (emptyMsg) emptyMsg.remove();

            const container = document.getElementById('notesListContainer');
            const noteItem = document.createElement('div');
            noteItem.className = 'note-item';
            
            noteItem.innerHTML = `
                <div class="note-tag">${activeNode.title}</div>
                <div>${noteText}</div>
            `;

            container.insertBefore(noteItem, container.firstChild);
            textarea.value = "";
        }

        window.onload = () => {
            updateAppUi();
        };
    </script>
</body>
</html>
